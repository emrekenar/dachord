name: Deploy (dev)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: backend
    outputs:
      api_url: ${{ steps.sam-outputs.outputs.api_url }}
      frontend_bucket: ${{ steps.sam-outputs.outputs.frontend_bucket }}
      cloudfront_distribution_id: ${{ steps.sam-outputs.outputs.cloudfront_distribution_id }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/dachord-github-deploy
          aws-region: eu-central-1
      - uses: aws-actions/setup-sam@v2
      - name: Build
        run: sam build --config-env dev
      - name: Deploy
        run: sam deploy --config-env dev --no-confirm-changeset --no-fail-on-empty-changeset
      - name: Read stack outputs
        id: sam-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name dachord-dev --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          BUCKET=$(aws cloudformation describe-stacks --stack-name dachord-dev --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          CF_ID=$(aws cloudformation describe-stacks --stack-name dachord-dev --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$CF_ID" >> $GITHUB_OUTPUT

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: frontend-web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ needs.deploy-backend.outputs.api_url }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/dachord-github-deploy
          aws-region: eu-central-1
      - name: Upload to S3
        run: aws s3 sync dist/ s3://${{ needs.deploy-backend.outputs.frontend_bucket }} --delete
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ needs.deploy-backend.outputs.cloudfront_distribution_id }} --paths "/*"
