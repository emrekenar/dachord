name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - run: npm ci
      - run: npm test

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test tests/UnitTests/UnitTests.csproj --no-build --configuration Release --verbosity minimal

      - name: Integration tests
        run: dotnet test tests/Integration/IntegrationTests.csproj --no-build --configuration Release --verbosity minimal
