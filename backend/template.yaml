AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
  Region:
    Type: String
    Default: eu-central-1
  TableNamePrefix:
    Type: String
  SsmParameterPath:
    Type: String
  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain (e.g. api.dachord.com). Leave empty to skip."
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: "ACM certificate ARN for DomainName. Required when DomainName is set."
  FrontendOrigin:
    Type: String
    Default: "*"
    Description: "Allowed CORS origin for the frontend (e.g. https://dachord.com)"

Conditions:
  IsProd: !Equals [!Ref Environment, prod]
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: dotnet10
    Architectures:
      - x86_64
    Environment:
      Variables:
        ASPNETCORE_ENVIRONMENT: !If [IsProd, Production, Staging]
        AWS__Region: !Ref Region
        AWS__ServiceName: !Sub "dachord-api-${Environment}"
        AWS__MetricsLogGroup: !Sub "/dachord/${Environment}/metrics"
        DynamoDb__TableNamePrefix: !Ref TableNamePrefix
        SSM__ParameterPath: !Ref SsmParameterPath
        CorsOrigin: !Ref FrontendOrigin

Resources:
  DachordApi:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "dachord-api-${Environment}"
      Handler: WebApi
      CodeUri: ./src/WebApi/
      Description: !Sub "Dachord API (${Environment})"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Scan
              Resource: !Sub "arn:aws:dynamodb:${Region}:${AWS::AccountId}:table/${TableNamePrefix}*"
            - Effect: Allow
              Action:
                - ssm:GetParametersByPath
              Resource: !Sub "arn:aws:ssm:${Region}:${AWS::AccountId}:parameter${SsmParameterPath}*"
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub "arn:aws:kms:${Region}:${AWS::AccountId}:key/*"
      Events:
        ProxyResource:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
            PayloadFormatVersion: "1.0"
        RootResource:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
            PayloadFormatVersion: "1.0"

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 20
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Dev-Key
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  # Custom domain resources — only created when DomainName is provided
  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref AcmCertificateArn
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCustomDomain
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiDomainName
      Stage: $default

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneName: !Sub "${DomainName}."
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiDomainName.RegionalDomainName
        HostedZoneId: !GetAtt ApiDomainName.RegionalHostedZoneId

  # Frontend hosting
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dachord-frontend-${Environment}"

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "dachord-frontend-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          AllowedMethods: [GET, HEAD, OPTIONS]
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        Aliases: !If
          - HasCustomDomain
          - [!Ref DomainName]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !If
      - HasCustomDomain
      - !Sub "https://${DomainName}/"
      - !Sub "https://${HttpApi}.execute-api.${Region}.amazonaws.com/"

  FrontendUrl:
    Description: CloudFront distribution URL
    Value: !Sub "https://${FrontendDistribution.DomainName}"

  FrontendBucketName:
    Description: S3 bucket name for frontend deployment
    Value: !Ref FrontendBucket
